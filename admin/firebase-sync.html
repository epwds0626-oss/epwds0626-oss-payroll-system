<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打刻データ取込 | 管理者</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
}

/* ロック画面 */
#lockScreen {
  position: fixed; inset: 0;
  background: #0f1923;
  display: flex; align-items: center; justify-content: center;
  z-index: 999;
}
.lock-box {
  background: #1c2837;
  border-radius: 20px;
  padding: 40px 36px;
  width: 320px;
  text-align: center;
  border: 1px solid #2a3a4a;
}
.lock-logo { font-size: 13px; color: #e8a020; letter-spacing: 0.1em; margin-bottom: 24px; }
.lock-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 24px; }
.lock-input {
  width: 100%;
  background: #243040;
  border: 2px solid #2a3a4a;
  border-radius: 10px;
  padding: 12px 16px;
  color: #fff;
  font-size: 20px;
  text-align: center;
  letter-spacing: 0.3em;
  margin-bottom: 14px;
  font-family: inherit;
}
.lock-input:focus { outline: none; border-color: #e8a020; }
.lock-btn {
  width: 100%;
  background: #e8a020;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}
.lock-err { color: #e74c3c; font-size: 13px; margin-top: 10px; min-height: 18px; }

/* メイン */
#mainApp { display: none; }

:root {
  --primary: #1a3a5c;
  --accent: #e8a020;
  --surface: #fff;
  --border: #dce3ec;
  --bg: #f0f2f5;
}
.top-bar {
  background: var(--primary);
  color: #fff;
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.top-bar-title { font-size: 15px; font-weight: 700; }
.top-bar-sub { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.content { padding: 20px; max-width: 960px; margin: 0 auto; }

.card {
  background: var(--surface);
  border-radius: 12px;
  padding: 20px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}
.card-title {
  font-size: 14px; font-weight: 700; color: var(--primary);
  margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 2px solid var(--bg);
}
.btn {
  border: none; border-radius: 8px; padding: 8px 18px;
  font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-accent  { background: var(--accent);  color: #fff; }
.btn-success { background: #27ae60; color: #fff; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }

table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
th { background: var(--primary); color: #fff; padding: 8px 10px; text-align: center; white-space: nowrap; }
td { padding: 7px 10px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
tr:hover td { background: #f8faff; }
.tl { text-align: left; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-green { background: #dcfce7; color: #166534; }
.badge-blue  { background: #dbeafe; color: #1e40af; }
.badge-gray  { background: #f3f4f6; color: #374151; }
.badge-red   { background: #fee2e2; color: #991b1b; }

.alert { border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 12.5px; display: flex; align-items: flex-start; gap: 8px; }
.alert-info { background: #e3f2fd; border: 1px solid #90caf9; color: #0d47a1; }
.alert-success { background: #e8f5e9; border: 1px solid #a5d6a7; color: #1b5e20; }

.sync-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #666; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.online { background: #27ae60; }
.dot.offline { background: #e74c3c; }

.month-selector { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.month-selector select {
  border: 1px solid var(--border); border-radius: 7px;
  padding: 6px 10px; font-family: inherit; font-size: 13px;
}

.working-now { color: #27ae60; font-weight: 600; font-size: 12px; }
.imported-badge { background: #dcfce7; color: #166534; border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
</style>
</head>
<body>

<!-- ロック画面 -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-logo">ONE TABLE DESIGN</div>
    <div class="lock-title">🔐 管理者ログイン</div>
    <input type="password" class="lock-input" id="pwInput" placeholder="●●●●"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lock-btn" onclick="doLogin()">ログイン</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<!-- メインアプリ -->
<div id="mainApp">
  <div class="top-bar">
    <div>
      <div class="top-bar-title">⏱ 打刻データ管理</div>
      <div class="top-bar-sub">株式会社 One Table Design</div>
    </div>
    <div class="sync-status">
      <span class="dot" id="connDot"></span>
      <span id="connText">接続中...</span>
      <span style="margin-left:12px;font-size:11px;opacity:0.7">最終取得：<span id="lastSync">—</span></span>
    </div>
  </div>

  <div class="content">

    <div class="alert alert-info">
      <span>💡</span>
      <div>スタッフが打刻したデータをリアルタイムで確認・取込できます。<br>
      「給与システムへ取込」を実行すると、給与管理システムの勤怠データに自動で反映されます。</div>
    </div>

    <!-- 月選択 -->
    <div class="month-selector">
      <label style="font-size:13px;font-weight:600;color:var(--primary)">対象月：</label>
      <select id="selYear"></select>
      <select id="selMonth"></select>
      <button class="btn btn-primary" onclick="loadMonth()">データ取得</button>
      <button class="btn btn-accent" onclick="importToPayroll()">📥 給与システムへ取込</button>
    </div>

    <!-- 今日のリアルタイム一覧 -->
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>📡 本日の打刻状況（リアルタイム）</span>
        <span id="todayDateLabel" style="font-size:12px;color:#888;font-weight:400"></span>
      </div>
      <div id="todayRealtime"><div style="color:#999;font-size:13px">読み込み中...</div></div>
    </div>

    <!-- 月次打刻データ -->
    <div class="card">
      <div class="card-title">📋 月次打刻データ</div>
      <div id="monthlyTable"><div style="color:#999;font-size:13px">上の「データ取得」を押してください</div></div>
    </div>

    <!-- 取込ログ -->
    <div class="card">
      <div class="card-title">✅ 取込ログ</div>
      <div id="importLog"><div style="color:#999;font-size:13px">取込操作の履歴がここに表示されます</div></div>
    </div>

  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// -------- Firebase --------
const firebaseConfig = {
  apiKey: "AIzaSyA3YVQwyAudMEZJs_rfEW8IHfxh4Grvlbw",
  authDomain: "wcsa-shift.firebaseapp.com",
  databaseURL: "https://wcsa-shift-default-rtdb.firebaseio.com",
  projectId: "wcsa-shift",
  storageBucket: "wcsa-shift.firebasestorage.app",
  messagingSenderId: "521554404721",
  appId: "1:521554404721:web:f59a570dd7e10f3aed82d0"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// -------- パスワードロック --------
const ADMIN_PW = '0626';
function doLogin() {
  const val = document.getElementById('pwInput').value;
  if (val === ADMIN_PW) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    initApp();
  } else {
    document.getElementById('lockErr').textContent = 'パスワードが違います';
    document.getElementById('pwInput').value = '';
  }
}

// -------- 定数 --------
let STAFF_LIST = [];

let monthlyRawData = {};
const importLogs = [];

// -------- 初期化 --------
function initApp() {
  initSelectors();
  subscribeConnection();
  // スタッフマスタを payroll/employees から読み込み
  db.ref('payroll/employees').on('value', snap => {
    const val = snap.val();
    if (val) {
      const raw = Array.isArray(val) ? val.filter(Boolean) : Object.values(val);
      STAFF_LIST = raw
        .filter(e => e && e.id && e.name && e.status !== 'inactive' && e.status !== 'leave')
        .sort((a, b) => (a.order ?? a.id * 10) - (b.order ?? b.id * 10))
        .map(e => ({ id: e.id, name: e.name, store: e.store || '' }));
    }
    subscribeTodayRealtime();
  });
}

function initSelectors() {
  const ySel = document.getElementById('selYear');
  const mSel = document.getElementById('selMonth');
  const now  = new Date();
  for (let y = 2024; y <= 2028; y++) {
    const o = document.createElement('option');
    o.value = y; o.text = y + '年';
    if (y === now.getFullYear()) o.selected = true;
    ySel.appendChild(o);
  }
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option');
    o.value = m; o.text = m + '月';
    if (m === now.getMonth()+1) o.selected = true;
    mSel.appendChild(o);
  }
}

// -------- 接続監視 --------
function subscribeConnection() {
  db.ref('.info/connected').on('value', snap => {
    const online = snap.val();
    document.getElementById('connDot').className = 'dot ' + (online ? 'online' : 'offline');
    document.getElementById('connText').textContent = online ? 'リアルタイム同期中' : 'オフライン';
  });
}

// -------- 今日のリアルタイム購読 --------
function subscribeTodayRealtime() {
  const now = new Date();
  const todayStr = toDateStr(now);
  const pm = payMonthKey(now);
  document.getElementById('todayDateLabel').textContent = toDateLabel(now);

  db.ref(`timecard/${pm}`).on('value', snap => {
    const raw = snap.val() || {};
    document.getElementById('lastSync').textContent = now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    renderTodayRealtime(raw, todayStr);
  });
}

function renderTodayRealtime(raw, todayStr) {
  const rows = STAFF_LIST.map(s => {
    const rec = ((raw[s.id] || {})[todayStr]) || {};
    const isWorking = rec.in && !rec.out;
    const duration  = rec.in && rec.out ? calcDuration(rec.in, rec.out) : null;
    return `<tr>
      <td class="tl">${s.name}</td>
      <td>${s.store}</td>
      <td>${rec.in  ? `<span class="badge badge-green">${rec.in}</span>`  : '<span style="color:#ccc">—</span>'}</td>
      <td>${rec.out ? `<span class="badge badge-blue">${rec.out}</span>`   : isWorking ? '<span class="working-now">勤務中</span>' : '<span style="color:#ccc">—</span>'}</td>
      <td>${duration ? duration + 'h' : '—'}</td>
      <td>${(() => {
        const breaks = rec.breaks || [];
        const done   = breaks.filter(b=>b.end);
        const onBrk  = breaks.some(b=>b.start&&!b.end);
        const total  = done.reduce((s,b)=>s+b.minutes,0);
        const BLBL   = {A:'🍱ランチ前',B:'😴ランチ後',C:'🌙ディナー後'};
        if (!breaks.length) return '—';
        return `<span style="font-size:11px">${done.map(b=>`${BLBL[b.type]||b.type} ${b.minutes}分`).join(' / ')}${onBrk?' ☕休憩中':''}<br><span style="color:#e67e22;font-weight:600">計${total}分</span></span>`;
      })()}</td>
      <td>${rec.in ? '<span class="badge badge-green">打刻済</span>' : '<span class="badge badge-gray">未</span>'}</td>
    </tr>`;
  }).join('');

  document.getElementById('todayRealtime').innerHTML = `
    <table>
      <thead><tr><th class="tl">氏名</th><th>店舗</th><th>出勤</th><th>退勤</th><th>実働</th><th>休憩</th><th>状態</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// -------- 月次データ取得 --------
function loadMonth() {
  const y = parseInt(document.getElementById('selYear').value);
  const m = parseInt(document.getElementById('selMonth').value);
  const pm = `${y}-${String(m).padStart(2,'0')}`;

  document.getElementById('monthlyTable').innerHTML = '<div style="color:#999;font-size:13px">取得中...</div>';

  db.ref(`timecard/${pm}`).once('value', snap => {
    monthlyRawData = snap.val() || {};
    renderMonthlyTable(y, m, monthlyRawData);
  });
}

function renderMonthlyTable(year, month, raw) {
  // 日付一覧（給与計算期間：前月21日〜当月20日）
  const dates = getPeriodDates(year, month);

  const headerDates = dates.map(d => {
    const dt = new Date(d);
    const dow = ['日','月','火','水','木','金','土'][dt.getDay()];
    const dd  = dt.getDate();
    return `<th style="min-width:42px;font-size:11px">${String(dt.getMonth()+1)}/${dd}<br>${dow}</th>`;
  }).join('');

  const rows = STAFF_LIST.map(s => {
    const empRec = raw[s.id] || {};
    let totalH = 0;
    const cells = dates.map(d => {
      const rec   = empRec[d] || {};
      const gross = rec.in && rec.out ? calcDurationNum(rec.in, rec.out) : null;
      const brkMin = (rec.breaks||[]).filter(b=>b.end).reduce((s,b)=>s+(b.minutes||0), 0);
      const dur   = gross != null ? Math.max(0, gross - brkMin/60) : null;
      if (dur) totalH += dur;
      if (!rec.in && !rec.out) return '<td style="color:#ddd;font-size:11px">—</td>';
      const inOut  = `${rec.in||'?'}${rec.out?'〜'+rec.out:'〜?'}`;
      const bg     = !rec.out ? 'background:#fff8e1' : '';
      const brkStr = brkMin ? `<br><span style="color:#e67e22;font-size:10px">休${brkMin}分</span>` : '';
      return `<td style="font-size:10px;${bg}">${inOut}${dur!=null?'<br><span style="color:#27ae60;font-weight:600">'+dur.toFixed(1)+'h</span>':''}${brkStr}</td>`;
    }).join('');
    return `<tr><td class="tl" style="white-space:nowrap">${s.name}</td><td style="font-size:11px">${s.store}</td>${cells}<td><strong>${totalH.toFixed(1)}h</strong></td></tr>`;
  }).join('');

  document.getElementById('monthlyTable').innerHTML = `
    <div style="font-size:12px;color:#666;margin-bottom:10px">
      賃金計算期間：${dates[0].replace(/-/g,'/')} 〜 ${dates[dates.length-1].replace(/-/g,'/')}
    </div>
    <div style="overflow-x:auto">
    <table>
      <thead><tr><th class="tl">氏名</th><th>店舗</th>${headerDates}<th>合計</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

// -------- 給与システムへ取込 --------
function importToPayroll() {
  if (!Object.keys(monthlyRawData).length) {
    alert('先に「データ取得」を押してください');
    return;
  }
  const y = parseInt(document.getElementById('selYear').value);
  const m = parseInt(document.getElementById('selMonth').value);

  // Firebase payroll/attendance に書き込む
  let imported = 0, skipped = 0;
  const updates = {};

  for (const s of STAFF_LIST) {
    const empRec = monthlyRawData[s.id] || {};
    for (const [dateStr, rec] of Object.entries(empRec)) {
      if (!rec.in) { skipped++; continue; }

      const dur = rec.out ? calcDurationNum(rec.in, rec.out) : null;
      if (!dur) { skipped++; continue; }

      // 休憩時間を引く
      const breaks    = rec.breaks || [];
      const breakMins = breaks.filter(b=>b.end&&b.minutes).reduce((s,b)=>s+b.minutes,0);
      const netDur    = Math.max(0, dur - breakMins/60);

      const [dy, dm] = dateStr.split('-').map(Number);
      const ym = `${dy}-${String(dm).padStart(2,'0')}`;

      // 深夜時間の概算（退勤が22時以降）
      let midnight = 0;
      if (rec.out) {
        const outH = timeToHour(rec.out);
        if (outH >= 22) midnight = Math.round((outH - 22) * 10) / 10;
        else if (outH < 5) midnight = Math.round((outH + 2) * 10) / 10;
      }

      // 日8h超残業の概算
      const dailyOT = Math.max(0, Math.round((netDur - 8) * 10) / 10);

      updates[`${ym}/${s.id}/${dateStr}`] = {
        actual:     Math.round(netDur * 10) / 10,
        dailyOT:    dailyOT,
        midnight:   Math.round(midnight * 10) / 10,
        midnightOT: Math.min(midnight, dailyOT),
        punchIn:    rec.in,
        punchOut:   rec.out || '',
        breakMins:  breakMins,
        breakCount: breaks.filter(b=>b.end).length,
        breaks:     breaks,
        source:     'timecard',
      };
      imported++;
    }
  }

  if (!imported) {
    alert('取込できるデータがありませんでした。\n退勤未打刻のデータはスキップされます。');
    return;
  }

  db.ref('payroll/attendance').update(updates)
    .then(() => {
      const log = { time: new Date().toLocaleString('ja-JP'), year: y, month: m, imported, skipped };
      importLogs.unshift(log);
      renderImportLog();
      alert(`✅ 取込完了\n\n${y}年${m}月分\n取込：${imported}件\nスキップ（退勤未打刻等）：${skipped}件\n\n給与管理システムの「勤怠入力」で確認・修正できます。`);
    })
    .catch(e => {
      alert('取込エラー：' + e.message);
    });
}

function renderImportLog() {
  if (!importLogs.length) return;
  document.getElementById('importLog').innerHTML = importLogs.map(l =>
    `<div style="padding:8px 0;border-bottom:1px solid #eee;font-size:12.5px">
      <span class="imported-badge">取込済</span>
      ${l.time}　${l.year}年${l.month}月分　取込 <strong>${l.imported}</strong>件 / スキップ ${l.skipped}件
    </div>`
  ).join('');
}

// -------- ユーティリティ --------
function toDateStr(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function toDateLabel(dt) {
  const dow = ['日','月','火','水','木','金','土'][dt.getDay()];
  return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日（${dow}）`;
}
function payMonthKey(dt) {
  const d = dt.getDate();
  const m = d >= 21 ? dt.getMonth()+2 : dt.getMonth()+1;
  const y = m > 12 ? dt.getFullYear()+1 : dt.getFullYear();
  return `${y}-${String(m>12?m-12:m).padStart(2,'0')}`;
}
function calcDuration(inStr, outStr) {
  const h = calcDurationNum(inStr, outStr);
  return h ? h.toFixed(1) : null;
}
function calcDurationNum(inStr, outStr) {
  if (!inStr || !outStr) return null;
  let diff = timeToHour(outStr) - timeToHour(inStr);
  if (diff < 0) diff += 24; // 日跨ぎ
  return Math.round(diff * 10) / 10;
}
function timeToHour(str) {
  const [h,m] = str.split(':').map(Number);
  return h + m/60;
}
function getPeriodDates(year, month) {
  const dates = [];
  const prevM = month===1 ? 12 : month-1;
  const prevY = month===1 ? year-1 : year;
  for (let d = 21; d <= new Date(prevY, prevM, 0).getDate(); d++) {
    dates.push(`${prevY}-${String(prevM).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }
  for (let d = 1; d <= 20; d++) {
    dates.push(`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
  }
  return dates;
}
</script>
</body>
</html>
