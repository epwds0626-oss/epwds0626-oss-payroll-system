<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与管理システム｜株式会社 One Table Design</title>
<link rel="stylesheet" href="css/style.css?v=20260719">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
#lockScreen {
  position: fixed; inset: 0;
  background: #0f1923;
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.lock-box {
  background: #1c2837;
  border-radius: 20px;
  padding: 40px 36px;
  width: 320px;
  text-align: center;
  border: 1px solid #2a3a4a;
}
.lock-logo { font-size: 13px; color: #e8a020; letter-spacing: 0.1em; margin-bottom: 24px; font-weight: 600; }
.lock-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.lock-sub { font-size: 12px; color: #666; margin-bottom: 24px; }
.lock-input {
  width: 100%; background: #243040;
  border: 2px solid #2a3a4a; border-radius: 10px;
  padding: 12px 16px; color: #fff;
  font-size: 22px; text-align: center;
  letter-spacing: 0.4em; margin-bottom: 14px; font-family: inherit;
}
.lock-input:focus { outline: none; border-color: #e8a020; }
.lock-btn {
  width: 100%; background: #e8a020; color: #fff;
  border: none; border-radius: 10px; padding: 13px;
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.lock-links { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
.lock-links a { color: #888; font-size: 12px; text-decoration: none; }
.lock-links a:hover { color: #e8a020; }
.lock-err { color: #e74c3c; font-size: 13px; margin-top: 10px; min-height: 18px; }
</style>
</head>
<body>

<!-- ロック画面 -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-logo">ONE TABLE DESIGN</div>
    <div class="lock-title">給与管理システム</div>
    <div class="lock-sub">管理者専用</div>
    <input type="password" class="lock-input" id="pwInput" placeholder="●●●●"
      onkeydown="if(event.key==='Enter')doAdminLogin()">
    <button class="lock-btn" onclick="doAdminLogin()">ログイン</button>
    <div class="lock-err" id="lockErr"></div>
    <div class="lock-links">
      <a href="../timecard/">👉 スタッフ打刻はこちら</a>
      <a href="admin/firebase-sync.html">📡 打刻データ取込</a>
    </div>
  </div>
</div>

<script>
function doAdminLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === '0218') {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('appBody').style.display = 'flex';
  } else {
    document.getElementById('lockErr').textContent = 'パスワードが違います';
    document.getElementById('pwInput').value = '';
  }
}
</script>

<div id="appBody" style="display:none;width:100%;min-height:100vh">
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">OTD</div>
    <div class="company-name">One Table Design</div>
  </div>
  <ul class="nav-menu">
    <li class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span>ダッシュボード</li>
    <li class="nav-item" data-page="employees"><span class="nav-icon">👥</span>従業員マスタ</li>
    <li class="nav-item" data-page="attendance"><span class="nav-icon">🕐</span>勤怠入力</li>
    <li class="nav-item" data-page="weekly"><span class="nav-icon">📅</span>週次集計（週マタギ）</li>
    <li class="nav-item" data-page="monthly"><span class="nav-icon">📋</span>月次勤怠</li>
    <li class="nav-item" data-page="salary"><span class="nav-icon">💴</span>給与計算</li>
    <li class="nav-item" data-page="payslip"><span class="nav-icon">🧾</span>給与明細</li>
    <li class="nav-item" data-page="paid_leave"><span class="nav-icon">🌿</span>有給管理簿</li>
    <li class="nav-item" data-page="article36"><span class="nav-icon">⚖️</span>３６協定管理</li>
    <li class="nav-item" data-page="freelance"><span class="nav-icon">🤝</span>業務委託</li>
    <li class="nav-item" data-page="bonus"><span class="nav-icon">🎯</span>賞与明細</li>
    <li class="nav-item" data-page="labor_report"><span class="nav-icon">📁</span>労基提出書類</li>
  </ul>
  <div class="sidebar-footer">
    <div class="version">v3.0 | 労基完全対応</div>
  </div>
</nav>

<main class="main-content">
  <header class="top-header">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div class="header-title" id="pageTitle">ダッシュボード</div>
    <div class="header-right">
      <select id="targetYear" onchange="refreshCurrentPage()"></select>
      <select id="targetMonth" onchange="refreshCurrentPage()"></select>
      <button class="btn-primary" onclick="saveData()">💾 保存</button>
    </div>
  </header>

  <div class="page-content" id="pageContent">
    <!-- pages rendered by JS -->
  </div>
</main>

<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal-box" id="modalBox"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="js/data.js?v=20260719"></script>
<script src="js/app.js?v=20260719"></script>
<script src="js/attendance.js?v=20260719"></script>
<script src="js/weekly.js?v=20260719"></script>
<script src="js/salary.js?v=20260719"></script>
<script src="js/paid_leave.js?v=20260719"></script>
<script src="js/article36.js?v=20260719"></script>
<script src="js/reports.js?v=20260719"></script>
<script src="js/ui.js?v=20260719"></script>
<script src="js/freelance.js?v=20260719"></script>
<script src="js/bonus.js?v=20260719"></script>
</div><!-- /appBody -->
</body>
</html>
